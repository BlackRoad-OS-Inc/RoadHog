name: Turbo CI
on:
    pull_request:

jobs:
    turbo-affected-4:
        timeout-minutes: 30
        name: Turbo Affected
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                # os: [depot-ubuntu-22.04, depot-ubuntu-22.04-4]
                os: [depot-ubuntu-22.04-4]
        permissions:
            contents: read

        steps:
            - name: Check out code
              uses: actions/checkout@v6
              with:
                  # Just fetch the current commit/PR head
                  fetch-depth: 1

            - name: Detect architecture
              if: ${{ runner.os == 'Linux' || runner.os == 'macOS' }}
              run: |
                  ARCH=$(uname -m)
                  echo "ARCH=$ARCH" >> $GITHUB_ENV

            # Conditionally fetch the base branch so Turborepo can compare against it
            - name: Fetch base branch with merge-base support
              run: |
                  if [ "${{ github.event_name }}" = "pull_request" ]; then
                    BASE_REF="${GITHUB_BASE_REF}"
                    # Try to fetch the base branch; fall back to master for Graphite virtual branches
                    # (e.g. graphite-base/49227) which don't exist as real remote refs
                    if ! git fetch origin "refs/heads/${BASE_REF}:refs/heads/${BASE_REF}" --depth=1 2>/dev/null; then
                      echo "::warning::Base branch ${BASE_REF} not found as remote ref, falling back to master"
                      BASE_REF="master"
                      git fetch origin "refs/heads/master:refs/heads/master" --depth=1
                    fi
                    # Deepen history until a merge base exists so turbo --affected can diff
                    for depth in 50 200 500; do
                      if git merge-base HEAD "refs/heads/${BASE_REF}" >/dev/null 2>&1; then
                        break
                      fi
                      echo "::notice::No merge base yet, deepening to $depth commits..."
                      git fetch --deepen="$depth" origin 2>/dev/null || true
                    done
                    if git merge-base HEAD "refs/heads/${BASE_REF}" >/dev/null 2>&1; then
                      echo "Merge base found: $(git merge-base HEAD refs/heads/${BASE_REF})"
                    else
                      echo "::warning::Could not find merge base after deepening"
                    fi
                    echo "TURBO_SCM_BASE=${BASE_REF}" >> $GITHUB_ENV
                  else
                    git fetch origin refs/heads/master:refs/heads/master --depth=1
                    echo "TURBO_SCM_BASE=master" >> $GITHUB_ENV
                  fi

            - name: Debug apt retry config
              run: apt-config dump | grep -i retries

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version-file: 'pyproject.toml'

            - name: Install uv
              id: setup-uv
              uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b # v7.3.0
              with:
                  version: '0.10.2' # pinned: unpinned setup-uv calls GH API on every job, exhausts rate limit
                  enable-cache: true
                  cache-dependency-glob: uv.lock

            - name: Install pnpm
              uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

            - name: Set up Node.js
              uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
              with:
                  node-version: 18
                  cache: 'pnpm'

            - name: Run Python and Node setup in parallel
              env:
                  UV_CACHE_HIT: ${{ steps.setup-uv.outputs.cache-hit }}
              run: |
                  set -e
                  set -m

                  (
                    if [ "$UV_CACHE_HIT" != "true" ]; then
                      echo ">>> [Python] Installing SAML (python3-saml) dependencies..."
                      sudo apt-get update
                      sudo apt-get install -y libxml2-dev libxmlsec1 libxmlsec1-dev libxmlsec1-openssl
                    fi

                    echo ">>> [Python] Installing dependencies..."
                    UV_PROJECT_ENVIRONMENT=$pythonLocation uv sync --frozen --dev
                  ) &
                  PY_PID=$!

                  (
                    echo ">>> [Node] Installing dependencies..."
                    pnpm install --frozen-lockfile --filter=@posthog/root
                  ) &
                  NODE_PID=$!

                  wait -n || (echo ">>> One of the parallel tasks failed, killing the other..." && kill $PY_PID $NODE_PID 2>/dev/null && exit 1)
                  wait -n || (echo ">>> The second parallel task failed" && exit 1)

                  echo ">>> Both parallel tasks completed successfully!"

            - name: Turbo affected vs. full dry-run comparison
              run: |
                  echo "============================================"
                  echo "  Turbo --affected dry-run comparison"
                  echo "============================================"
                  echo ""

                  for task in build test; do
                    echo "--- Task: $task ---"

                    full_json=$(bin/turbo run "$task" --dry-run=json 2>/dev/null)
                    affected_json=$(bin/turbo run "$task" --affected --dry-run=json 2>/dev/null)

                    full_pkgs=$(echo "$full_json" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('packages',[])))")
                    affected_pkgs=$(echo "$affected_json" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('packages',[])))")

                    full_tasks=$(echo "$full_json" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('tasks',[])))")
                    affected_tasks=$(echo "$affected_json" | python3 -c "import sys,json; print(len(json.load(sys.stdin).get('tasks',[])))")

                    echo "  Packages: full=$full_pkgs  affected=$affected_pkgs  (skipped $((full_pkgs - affected_pkgs)))"
                    echo "  Tasks:    full=$full_tasks  affected=$affected_tasks  (skipped $((full_tasks - affected_tasks)))"

                    # Show which packages --affected selected
                    echo "  Affected packages:"
                    echo "$affected_json" | python3 -c "
                  import sys, json
                  for p in json.load(sys.stdin).get('packages', []):
                      print(f'    - {p}')
                  " || true
                    echo ""
                  done
              env:
                  NODE_OPTIONS: --max-old-space-size=8192
                  TURBO_SCM_BASE: ${{ env.TURBO_SCM_BASE }}
