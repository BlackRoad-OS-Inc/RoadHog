name: Docker meta and registry login
description: Log in to GHCR, DockerHub, and ECR, then generate standardized Docker image tags and labels.

inputs:
    image-name:
        required: true
        description: 'Image name without registry prefix (e.g., posthog-node, capture, llm-gateway)'
    aws-role-to-assume:
        required: true
        description: 'AWS IAM role ARN for ECR access'
    github-token:
        required: true
        description: 'GitHub token for GHCR login'
    dockerhub-username:
        required: true
        description: 'DockerHub username'
    dockerhub-password:
        required: true
        description: 'DockerHub password/token'
    legacy-images:
        required: false
        default: ''
        description: 'Additional legacy image destinations (newline-separated) to publish to during migration. Remove once consumers are updated to the standard paths.'

outputs:
    tags:
        description: 'Docker metadata tags'
        value: ${{ steps.meta.outputs.tags }}
    labels:
        description: 'Docker metadata labels'
        value: ${{ steps.meta.outputs.labels }}
    ecr-registry:
        description: 'ECR registry URL'
        value: ${{ steps.aws-ecr.outputs.registry }}

runs:
    using: 'composite'
    steps:
        - name: Configure AWS credentials
          uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
          with:
              role-to-assume: ${{ inputs.aws-role-to-assume }}
              aws-region: us-east-1

        - name: Login to Amazon ECR
          id: aws-ecr
          uses: aws-actions/amazon-ecr-login@062b18b96a7aff071d4dc91bc00c4c1a7945b076 # v2.0.1

        - name: Login to ghcr.io
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ inputs.github-token }}
              logout: false

        - name: Login to DockerHub
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
              username: ${{ inputs.dockerhub-username }}
              password: ${{ inputs.dockerhub-password }}

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
          with:
              images: |
                  ghcr.io/posthog/${{ inputs.image-name }}
                  posthog/${{ inputs.image-name }}
                  ${{ steps.aws-ecr.outputs.registry }}/${{ inputs.image-name }}
              tags: |
                  type=ref,event=pr
                  type=ref,event=branch
                  type=sha
                  type=raw,value=${{ github.sha }}
                  type=raw,value=latest,enable={{is_default_branch}}
