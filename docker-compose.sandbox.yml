#
# Self-contained compose file for isolated dev sandboxes.
# Each sandbox is a complete PostHog stack with its own infra.
#
# Usage:
#   SANDBOX_PORT=48001 SANDBOX_CODE=~/.worktrees/posthog/feat1 \
#     docker compose -p sandbox-feat1 -f docker-compose.sandbox.yml up -d
#

services:
    app:
        build:
            context: .
            dockerfile: Dockerfile.sandbox
        restart: on-failure
        # Run as the host user so files created in the mounted worktree
        # (node_modules, .venv) have correct ownership
        user: "${SANDBOX_UID:-1000}:${SANDBOX_GID:-1000}"
        # mprocs (used by bin/start) requires a TTY
        tty: true
        stdin_open: true
        ports:
            - "${SANDBOX_PORT:-48001}:8000"
            - "${SANDBOX_VITE_PORT:-8234}:8234"
        volumes:
            # Mount worktree code only — no overlays from main repo
            - ${SANDBOX_CODE:-.}:/workspace
        environment:
            DEBUG: '1'
            DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            CLICKHOUSE_HOST: 'clickhouse'
            CLICKHOUSE_DATABASE: 'posthog'
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            KAFKA_HOSTS: 'kafka:9092'
            REDIS_URL: 'redis://redis7:6379/'
            PGHOST: db
            PGUSER: posthog
            PGPASSWORD: posthog
            PERSONS_DB_WRITER_URL: 'postgres://posthog:posthog@db:5432/posthog'
            PERSONS_DB_READER_URL: 'postgres://posthog:posthog@db:5432/posthog'
            SKIP_SERVICE_VERSION_REQUIREMENTS: '1'
            IS_BEHIND_PROXY: 'true'
            DISABLE_SECURE_SSL_REDIRECT: 'true'
            SESSION_RECORDING_V2_S3_ENDPOINT: 'http://objectstorage:19000'
            OBJECT_STORAGE_ENDPOINT: 'http://objectstorage:19000'
            OBJECT_STORAGE_ACCESS_KEY_ID: 'object_storage_root_user'
            OBJECT_STORAGE_SECRET_ACCESS_KEY: 'object_storage_root_password'
            # Signals to scripts (wait-for-docker, start-backend) that
            # they're running inside a sandbox container
            POSTHOG_SANDBOX: '1'
            HOST_BIND: '0.0.0.0'
            # DuckLake connects to Postgres — point at the compose service, not localhost
            DUCKLAKE_RDS_HOST: 'db'
            DUCKLAKE_RDS_PORT: '5432'
            DUCKLAKE_RDS_USERNAME: 'posthog'
            DUCKLAKE_RDS_PASSWORD: 'posthog'
            DUCKLAKE_S3_ACCESS_KEY: 'object_storage_root_user'
            DUCKLAKE_S3_SECRET_KEY: 'object_storage_root_password'
            DUCKLAKE_BUCKET: 'ducklake-dev'
            DUCKLAKE_BUCKET_REGION: 'us-east-1'
        depends_on:
            db:
                condition: service_healthy
            redis7:
                condition: service_healthy
            clickhouse:
                condition: service_healthy
            kafka:
                condition: service_healthy
            objectstorage:
                condition: service_started

    db:
        image: postgres:15.12-alpine
        restart: on-failure
        environment:
            POSTGRES_USER: posthog
            POSTGRES_DB: posthog
            POSTGRES_PASSWORD: posthog
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U posthog']
            interval: 5s
            timeout: 30s
            retries: 30
            start_period: 10s
        volumes:
            - postgres-data:/var/lib/postgresql/data
            - ${SANDBOX_CODE:-.}/docker/postgres-init-scripts:/docker-entrypoint-initdb.d:ro
        command: postgres -c max_connections=1000 -c idle_in_transaction_session_timeout=300000

    redis7:
        image: redis:7.2-alpine
        restart: on-failure
        command: redis-server --maxmemory-policy allkeys-lru --maxmemory 200mb
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 3s
            timeout: 10s
            retries: 10

    clickhouse:
        image: ${CLICKHOUSE_SERVER_IMAGE:-clickhouse/clickhouse-server:25.12.5.44}
        restart: on-failure
        mem_limit: 8g
        cpus: 2
        environment:
            CLICKHOUSE_SKIP_USER_SETUP: 1
            KAFKA_HOSTS: 'kafka:9092'
            AWS_ACCESS_KEY_ID: object_storage_root_user
            AWS_SECRET_ACCESS_KEY: object_storage_root_password
        healthcheck:
            test: ['CMD-SHELL', 'wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1']
            interval: 3s
            timeout: 10s
            retries: 10
        volumes:
            # Config from the worktree (read-only — sandbox ClickHouse never writes these)
            - ${SANDBOX_CODE:-.}/posthog/idl:/idl:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/docker-entrypoint-initdb.d:/docker-entrypoint-initdb.d:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/config.d/default.xml:/etc/clickhouse-server/config.d/default.xml:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/config.d/dev-memory.xml:/etc/clickhouse-server/config.d/dev-memory.xml:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/users-dev.xml:/etc/clickhouse-server/users.xml:ro
            - ${SANDBOX_CODE:-.}/docker/clickhouse/user_defined_function.xml:/etc/clickhouse-server/user_defined_function.xml:ro
            - ${SANDBOX_CODE:-.}/posthog/user_scripts:/var/lib/clickhouse/user_scripts:ro
        depends_on:
            - kafka
            - zookeeper

    zookeeper:
        image: zookeeper:3.7.0
        restart: on-failure

    kafka:
        image: docker.redpanda.com/redpandadata/redpanda:v25.1.9
        restart: on-failure
        command:
            - redpanda
            - start
            - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
            - --advertise-kafka-addr internal://kafka:9092,external://localhost:19092
            - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
            - --advertise-pandaproxy-addr internal://kafka:8082,external://localhost:18082
            - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
            - --rpc-addr kafka:33145
            - --advertise-rpc-addr kafka:33145
            - --mode dev-container
            - --smp 2
            - --memory 3G
            - --reserve-memory 500M
            - --overprovisioned
            - --set redpanda.empty_seed_starts_cluster=false
            - --seeds kafka:33145
            - --set redpanda.auto_create_topics_enabled=true
        volumes:
            - redpanda-data:/var/lib/redpanda/data
        environment:
            ALLOW_PLAINTEXT_LISTENER: 'true'
        healthcheck:
            test: curl -f http://localhost:9644/v1/status/ready || exit 1
            interval: 3s
            timeout: 10s
            retries: 10

    objectstorage:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        restart: on-failure
        environment:
            MINIO_ROOT_USER: object_storage_root_user
            MINIO_ROOT_PASSWORD: object_storage_root_password
        entrypoint: sh
        command: -c 'mkdir -p /data/posthog /data/ducklake-dev /data/ai-blobs && minio server --address ":19000" --console-address ":19001" /data'

    # Temporal (optional — started but not exposed to host)
    elasticsearch:
        environment:
            - cluster.routing.allocation.disk.threshold_enabled=true
            - cluster.routing.allocation.disk.watermark.low=512mb
            - cluster.routing.allocation.disk.watermark.high=256mb
            - cluster.routing.allocation.disk.watermark.flood_stage=128mb
            - discovery.type=single-node
            - ES_JAVA_OPTS=-Xms256m -Xmx256m
            - xpack.security.enabled=false
        image: elasticsearch:7.17.28
        expose:
            - 9200
        volumes:
            - /var/lib/elasticsearch/data

    temporal:
        restart: on-failure
        healthcheck:
            test: ['CMD-SHELL', 'nc -z $(hostname) 7233']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 300s
        environment:
            - DB=postgres12
            - DB_PORT=5432
            - POSTGRES_USER=posthog
            - POSTGRES_PWD=posthog
            - POSTGRES_SEEDS=db
            - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
            - ENABLE_ES=true
            - ES_SEEDS=elasticsearch
            - ES_VERSION=v7
        image: temporalio/auto-setup:1.26.2
        labels:
            kompose.volume.type: configMap
        volumes:
            - ${SANDBOX_CODE:-.}/docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
        depends_on:
            db:
                condition: service_healthy
            elasticsearch:
                condition: service_started

volumes:
    postgres-data:
    redpanda-data:
