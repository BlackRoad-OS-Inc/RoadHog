#
# App services for containerized local development.
#
# Infrastructure (postgres, redis, clickhouse, kafka, etc.) must already be
# running via docker-compose.dev.yml. This file only runs the application
# layer and joins the same Docker network.
#
# Usage:
#   bin/start-docker up --build     # first run
#   bin/start-docker up             # subsequent runs
#   bin/start-docker down           # stop app services (infra keeps running)
#

x-app-env: &app-env
    DEBUG: '1'
    SKIP_SERVICE_VERSION_REQUIREMENTS: '1'
    DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
    CLICKHOUSE_HOST: 'clickhouse'
    CLICKHOUSE_DATABASE: 'posthog'
    CLICKHOUSE_SECURE: 'false'
    CLICKHOUSE_VERIFY: 'false'
    CLICKHOUSE_API_USER: 'api'
    CLICKHOUSE_API_PASSWORD: 'apipass'
    CLICKHOUSE_APP_USER: 'app'
    CLICKHOUSE_APP_PASSWORD: 'apppass'
    KAFKA_HOSTS: 'kafka:9092'
    REDIS_URL: 'redis://redis7:6379/'
    PGHOST: db
    PGUSER: posthog
    PGPASSWORD: posthog
    BILLING_SERVICE_URL: '${BILLING_SERVICE_URL:-https://billing.dev.posthog.dev}'
    API_QUERIES_PER_TEAM: '{"1": 100}'
    CDP_API_URL: 'http://plugins:6738'
    OBJECT_STORAGE_ENDPOINT: 'http://objectstorage:19000'
    SESSION_RECORDING_V2_S3_ENDPOINT: 'http://seaweedfs:8333'
    FLAGS_REDIS_ENABLED: 'false'

x-app-build: &app-build
    build:
        context: .
        dockerfile: Dockerfile.dev

x-app-volumes: &app-volumes
    - .:/code
    - app-node-modules:/code/node_modules
    - app-pnpm-store:/code/.pnpm-store
    - app-uv-cache:/root/.cache/uv

services:
    # ---------------------------------------------------------------
    # Backend (Django via Granian with hot-reload)
    # ---------------------------------------------------------------
    backend:
        <<: *app-build
        command: >
            bash -c "
            uv sync --active --quiet &&
            python -m granian
                --interface asgi
                posthog.asgi:application
                --reload
                --reload-paths ./posthog
                --reload-paths ./ee
                --reload-paths ./products
                --reload-paths ./frontend/src/products.json
                --host 0.0.0.0
                --log-level debug
                --workers 1
            "
        volumes: *app-volumes
        environment:
            <<: *app-env
            PROMETHEUS_MULTIPROC_DIR: /tmp/prometheus
        networks:
            default:
                aliases:
                    - web
        ports:
            - '${POSTHOG_BACKEND_PORT:-8000}:8000'
        depends_on:
            migrate:
                condition: service_completed_successfully

    # ---------------------------------------------------------------
    # Frontend (Vite dev server with HMR)
    # ---------------------------------------------------------------
    frontend:
        <<: *app-build
        command: >
            bash -c "
            corepack enable &&
            pnpm --filter=@posthog/frontend... install &&
            pnpm turbo --filter=@posthog/frontend start-vite -- --host 0.0.0.0
            "
        volumes: *app-volumes
        environment:
            DEBUG: '0'
            COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
            VITE_BACKEND_URL: 'http://web:8000'
        ports:
            - '${POSTHOG_FRONTEND_PORT:-8234}:8234'
        depends_on:
            - backend

    # ---------------------------------------------------------------
    # Celery worker
    # ---------------------------------------------------------------
    celery-worker:
        <<: *app-build
        command: >
            bash -c "
            uv sync --active --quiet &&
            source ./bin/celery-queues.env &&
            python manage.py run_autoreload_celery --type=worker
            "
        volumes: *app-volumes
        environment:
            <<: *app-env
        depends_on:
            migrate:
                condition: service_completed_successfully

    # ---------------------------------------------------------------
    # Celery beat scheduler
    # ---------------------------------------------------------------
    celery-beat:
        <<: *app-build
        command: >
            bash -c "
            uv sync --active --quiet &&
            source ./bin/celery-queues.env &&
            python manage.py run_autoreload_celery --type=beat
            "
        volumes: *app-volumes
        environment:
            <<: *app-env
        depends_on:
            migrate:
                condition: service_completed_successfully

    # ---------------------------------------------------------------
    # Plugins (Node.js ingestion pipeline)
    # ---------------------------------------------------------------
    plugins:
        image: ghcr.io/posthog/posthog-node:master
        command: node nodejs/dist/index.js
        restart: on-failure
        environment:
            DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            PERSONS_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            BEHAVIORAL_COHORTS_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            KAFKA_HOSTS: 'kafka:9092'
            REDIS_URL: 'redis://redis7:6379/'
            CLICKHOUSE_HOST: 'clickhouse'
            CLICKHOUSE_DATABASE: 'posthog'
            CLICKHOUSE_SECURE: 'false'
            CLICKHOUSE_VERIFY: 'false'
            COOKIELESS_REDIS_HOST: redis7
            COOKIELESS_REDIS_PORT: 6379
            SESSION_RECORDING_API_REDIS_HOST: redis7
            SESSION_RECORDING_API_REDIS_PORT: 6379
            CDP_REDIS_HOST: redis7
            ENCRYPTION_SALT_KEYS: '00beef0000beef0000beef0000beef00'
        ports:
            - '${POSTHOG_PLUGINS_PORT:-6738}:6738'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:6738/_ready']
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 15s

    # ---------------------------------------------------------------
    # Proxy (Caddy — routes to containers by DNS name)
    # ---------------------------------------------------------------
    proxy:
        image: caddy
        entrypoint: sh
        restart: always
        command: -c 'set -x && echo "$$CADDYFILE" > /etc/caddy/Caddyfile && exec caddy run -c /etc/caddy/Caddyfile'
        volumes:
            - /root/.caddy
        environment:
            CADDYFILE: |
                http://localhost:8000 {
                    @replay-capture {
                        path /s
                        path /s/
                        path /s/*
                    }

                    @capture-ai {
                        path /i/v0/ai
                        path /i/v0/ai/
                        path /i/v0/ai/*
                    }

                    @capture {
                        path /e
                        path /e/
                        path /e/*
                        path /i/v0
                        path /i/v0/
                        path /i/v0/*
                        path /batch
                        path /batch/
                        path /batch/*
                        path /capture
                        path /capture/
                        path /capture/*
                    }

                    @flags {
                        path /flags
                        path /flags/
                        path /flags/*
                    }

                    @webhooks {
                        path /public/webhooks
                        path /public/webhooks/
                        path /public/webhooks/*
                        path /public/m/
                        path /public/m/*
                    }

                    @livestream {
                        path /livestream
                        path /livestream/
                        path /livestream/*
                    }

                    handle @livestream {
                        uri strip_prefix /livestream
                        reverse_proxy livestream:8080 {
                            flush_interval -1
                        }
                    }

                    handle @capture-ai {
                        reverse_proxy capture-ai:3000
                    }

                    handle @capture {
                        reverse_proxy capture:3000
                    }

                    handle @replay-capture {
                        reverse_proxy replay-capture:3000
                    }

                    handle @flags {
                        reverse_proxy feature-flags:3001
                    }

                    handle @webhooks {
                        reverse_proxy plugins:6738
                    }

                    @objectstorage {
                        path /posthog
                        path /posthog/
                        path /posthog/*
                    }

                    handle @objectstorage {
                        reverse_proxy objectstorage:19000
                    }

                    handle {
                        reverse_proxy web:8000
                    }
                }
        ports:
            - '${POSTHOG_PROXY_PORT:-8010}:8000'

    # ---------------------------------------------------------------
    # Capture (Rust, pre-built image)
    # ---------------------------------------------------------------
    capture:
        image: ghcr.io/posthog/posthog/capture:master
        restart: on-failure
        environment:
            ADDRESS: '0.0.0.0:3000'
            KAFKA_TOPIC: 'events_plugin_ingestion'
            KAFKA_HOSTS: 'kafka:9092'
            REDIS_URL: 'redis://redis7:6379/'
            CAPTURE_MODE: events
            RUST_LOG: 'info,rdkafka=warn'
        ports:
            - '${POSTHOG_CAPTURE_PORT:-3307}:3000'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3000/_liveness']
            interval: 5s
            timeout: 5s
            retries: 24
            start_period: 10s

    # ---------------------------------------------------------------
    # Replay capture (Rust, pre-built image)
    # ---------------------------------------------------------------
    replay-capture:
        image: ghcr.io/posthog/posthog/capture:master
        restart: on-failure
        environment:
            ADDRESS: '0.0.0.0:3000'
            KAFKA_TOPIC: 'session_recording_snapshot_item_events'
            KAFKA_HOSTS: 'kafka:9092'
            REDIS_URL: 'redis://redis7:6379/'
            CAPTURE_MODE: recordings
        ports:
            - '${POSTHOG_REPLAY_CAPTURE_PORT:-3306}:3000'

    # ---------------------------------------------------------------
    # Feature flags (Rust, pre-built image)
    # ---------------------------------------------------------------
    feature-flags:
        image: ghcr.io/posthog/posthog/feature-flags:master
        restart: on-failure
        volumes:
            - ./share:/share
        environment:
            WRITE_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            READ_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            PERSONS_WRITE_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            PERSONS_READ_DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            MAXMIND_DB_PATH: '/share/GeoLite2-City.mmdb'
            REDIS_URL: 'redis://redis7:6379/'
            ADDRESS: '0.0.0.0:3001'
            RUST_LOG: 'info'
            COOKIELESS_REDIS_HOST: redis7
            COOKIELESS_REDIS_PORT: 6379
            FLAGS_REDIS_URL: 'redis://redis7:6379/1'
            FLAGS_REDIS_ENABLED: 'false'
            REDIS_COMPRESSION_ENABLED: 'true'
        ports:
            - '${POSTHOG_FLAGS_PORT:-3001}:3001'
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:3001/_readiness']
            interval: 5s
            timeout: 5s
            retries: 12
            start_period: 10s

    # ---------------------------------------------------------------
    # Property defs (Rust, pre-built image)
    # ---------------------------------------------------------------
    property-defs-rs:
        image: ghcr.io/posthog/posthog/property-defs-rs:master
        restart: on-failure
        environment:
            DATABASE_URL: 'postgres://posthog:posthog@db:5432/posthog'
            KAFKA_HOSTS: 'kafka:9092'
            SKIP_WRITES: 'false'
            SKIP_READS: 'false'
            FILTER_MODE: 'opt-out'

    # ---------------------------------------------------------------
    # Cyclotron janitor (Rust, pre-built image)
    # ---------------------------------------------------------------
    cyclotron-janitor:
        image: ghcr.io/posthog/posthog/cyclotron-janitor:master
        restart: on-failure
        environment:
            DATABASE_URL: 'postgres://posthog:posthog@db:5432/cyclotron'
            KAFKA_HOSTS: 'kafka:9092'
            KAFKA_TOPIC: 'clickhouse_app_metrics2'

    # ---------------------------------------------------------------
    # Temporal Django worker (profile: temporal)
    # ---------------------------------------------------------------
    temporal-django-worker:
        <<: *app-build
        command: >
            bash -c "
            uv sync --active --quiet &&
            ./bin/temporal-django-worker
            "
        volumes: *app-volumes
        environment:
            <<: *app-env
            TEMPORAL_HOST: temporal
        profiles:
            - temporal

    # ---------------------------------------------------------------
    # Livestream (Go, pre-built image, profile: livestream)
    # ---------------------------------------------------------------
    livestream:
        image: 'ghcr.io/posthog/posthog/livestream:master'
        restart: on-failure
        ports:
            - '${POSTHOG_LIVESTREAM_PORT:-8666}:8080'
        profiles:
            - livestream

    # ---------------------------------------------------------------
    # Migrate (one-shot, runs before backend starts)
    # ---------------------------------------------------------------
    migrate:
        <<: *app-build
        command: >
            bash -c "
            uv sync --active --quiet &&
            python manage.py migrate &&
            python manage.py migrate_clickhouse
            "
        volumes: *app-volumes
        environment:
            <<: *app-env
        restart: 'no'

networks:
    default:
        name: posthog_default
        external: true

volumes:
    app-node-modules:
    app-pnpm-store:
    app-uv-cache:
